<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
    <!-- theme-color drives the Android status-bar tint. Kept in sync with the
         PWA manifest (vite.config.ts) and the --bg token in index.css. This is
         the light-mode value; the media-query below swaps it in dark mode. -->
    <meta name="theme-color" content="#F7F8FA" media="(prefers-color-scheme: light)" />
    <meta name="theme-color" content="#0E1116" media="(prefers-color-scheme: dark)" />
    <title>Head-in</title>
    <!-- Set the theme synchronously, before the module bundle loads, so there's
         no flash of the wrong theme on cold start. Defaults to the OS
         preference; the saved override (if any) is applied a beat later once
         IndexedDB resolves. -->
    <script>
      try {
        var dark = window.matchMedia('(prefers-color-scheme: dark)').matches;
        document.documentElement.setAttribute('data-theme', dark ? 'dark' : 'light');
      } catch (e) {}
    </script>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
