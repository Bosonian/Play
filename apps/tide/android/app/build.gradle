apply plugin: 'com.android.application'

android {
    namespace "de.bosonian.tide"
    compileSdk rootProject.ext.compileSdkVersion
    defaultConfig {
        applicationId "de.bosonian.tide"
        minSdkVersion rootProject.ext.minSdkVersion
        targetSdkVersion rootProject.ext.targetSdkVersion
        // LOUD NOTE (mirrors apps/runway/android/app/build.gradle): versionCode/
        // versionName here and APP_VERSION_CODE/APP_VERSION in
        // src/lib/appVersion.ts are THREE separate, hand-maintained values that
        // must move together on every release — src/lib/updateCheck.ts compares
        // APP_VERSION_CODE against a published release's stamped versionCode
        // (see that file). A mismatch means the in-app update check silently
        // breaks, or advertises an "update" that's actually the build already
        // running. A build-time injection would remove the duplication; see
        // appVersion.ts and README.md's v1.5 list (same unsolved problem Runway
        // carries too).
        versionCode 2
        versionName "0.2.0"
        testInstrumentationRunner "androidx.test.runner.AndroidJUnitRunner"
        aaptOptions {
             // Files and dirs to omit from the packaged assets dir, modified to accommodate modern web apps.
             // Default: https://android.googlesource.com/platform/frameworks/base/+/282e181b58cf72b6ca770dc7ca5f91f135444502/tools/aapt/AaptAssets.cpp#61
            ignoreAssetsPattern '!.svn:!.git:!.ds_store:!*.scc:.*:!CVS:!thumbs.db:!picasa.ini:!*~'
        }
    }
    // Release signing config. Reuses apps/runway/signing/runway.keystore
    // (copied verbatim to apps/tide/signing/runway.keystore) rather than
    // minting a second keystore — same committed-keystore tradeoff Runway's
    // own build.gradle documents (see apps/tide/README.md "Signing" section
    // for the full threat model), now shared identity across both apps. The
    // keystore's certificate CN says "Runway" (it predates Tide); that's
    // cosmetic only — Android's signature check is the key material, not the
    // certificate's subject fields, so it works identically for signing an
    // app called Tide. Moving both apps' keystores to CI secrets remains the
    // recommended hardening, not done here.
    signingConfigs {
        release {
            storeFile file('../../signing/runway.keystore')
            storePassword 'runway-local-signing'
            keyAlias 'runway'
            keyPassword 'runway-local-signing'
        }
    }
    buildTypes {
        release {
            minifyEnabled false
            proguardFiles getDefaultProguardFile('proguard-android.txt'), 'proguard-rules.pro'
            signingConfig signingConfigs.release
        }
    }
}

repositories {
    flatDir{
        dirs '../capacitor-cordova-android-plugins/src/main/libs', 'libs'
    }
}

dependencies {
    implementation fileTree(include: ['*.jar'], dir: 'libs')
    implementation "androidx.appcompat:appcompat:$androidxAppCompatVersion"
    implementation "androidx.coordinatorlayout:coordinatorlayout:$androidxCoordinatorLayoutVersion"
    implementation "androidx.core:core-splashscreen:$coreSplashScreenVersion"
    implementation project(':capacitor-android')
    testImplementation "junit:junit:$junitVersion"
    androidTestImplementation "androidx.test.ext:junit:$androidxJunitVersion"
    androidTestImplementation "androidx.test.espresso:espresso-core:$androidxEspressoCoreVersion"
    implementation project(':capacitor-cordova-android-plugins')
}

apply from: 'capacitor.build.gradle'

try {
    def servicesJSON = file('google-services.json')
    if (servicesJSON.text) {
        apply plugin: 'com.google.gms.google-services'
    }
} catch(Exception e) {
    logger.info("google-services.json not found, google-services plugin not applied. Push Notifications won't work")
}
