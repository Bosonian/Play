apply plugin: 'com.android.application'

// Resolve version inputs into plain locals BEFORE the android block. Doing the
// `.toInteger()` chain inline on `versionCode (...)` trips a Groovy command-
// parsing gotcha: `versionCode (expr).toString()` binds as
// `versionCode(expr).toString()` — the setter is called first (returns null)
// and the chain then runs on null ("Value is null"). Resolving here avoids it.
def resolvedVersionCode = (project.findProperty('companionVersionCode') ?: '1').toString().toInteger()
def resolvedVersionName = (project.findProperty('companionVersionName') ?: '0.0.0-local').toString()

android {
    namespace "app.dosing.companion"
    compileSdk rootProject.ext.compileSdkVersion

    // Stable signing identity for every build (see the keystore note below).
    // WHY committed, and the tradeoff: this is a *test* key whose password is
    // public in the repo on purpose, so that CI can sign every build with the
    // SAME identity without any secret setup. That consistent signature is
    // what lets a new build install over an old one (Android refuses a
    // signature change) and what makes Play Protect treat this as one app
    // updating itself rather than a stream of strangers. It is explicitly NOT
    // a Play Store production key — publishing to Play would need a private
    // key generated then, and that key would become the app's permanent
    // identity. Overridable from CI via -PcompanionStoreFile etc. if a real
    // key is ever wired in as a secret, without touching this file.
    signingConfigs {
        release {
            storeFile file(project.findProperty('companionStoreFile') ?: 'companion-release.jks')
            storePassword project.findProperty('companionStorePassword') ?: 'companiontest'
            keyAlias project.findProperty('companionKeyAlias') ?: 'companion'
            keyPassword project.findProperty('companionKeyPassword') ?: 'companiontest'
        }
    }

    defaultConfig {
        applicationId "app.dosing.companion"
        minSdkVersion rootProject.ext.minSdkVersion
        targetSdkVersion rootProject.ext.targetSdkVersion
        // versionCode must strictly increase across builds for Android to
        // accept an update. CI passes -PcompanionVersionCode=<run number>;
        // a local build with no property falls back to 1. (Resolved above.)
        versionCode resolvedVersionCode
        // Cosmetic; CI passes the package.json version. Falls back to a
        // marker so a local build is obviously not a CI build.
        versionName resolvedVersionName
        testInstrumentationRunner "androidx.test.runner.AndroidJUnitRunner"
        aaptOptions {
             // Files and dirs to omit from the packaged assets dir, modified to accommodate modern web apps.
             // Default: https://android.googlesource.com/platform/frameworks/base/+/282e181b58cf72b6ca770dc7ca5f91f135444502/tools/aapt/AaptAssets.cpp#61
            ignoreAssetsPattern '!.svn:!.git:!.ds_store:!*.scc:.*:!CVS:!thumbs.db:!picasa.ini:!*~'
        }
    }
    buildTypes {
        release {
            minifyEnabled false
            proguardFiles getDefaultProguardFile('proguard-android.txt'), 'proguard-rules.pro'
            // Sign release with the stable key above, so assembleRelease
            // emits a signed app-release.apk (not app-release-unsigned.apk).
            signingConfig signingConfigs.release
            // Explicitly non-debuggable — this is the build users install.
            debuggable false
        }
    }
}

repositories {
    flatDir{
        dirs '../capacitor-cordova-android-plugins/src/main/libs', 'libs'
    }
}

dependencies {
    implementation fileTree(include: ['*.jar'], dir: 'libs')
    implementation "androidx.appcompat:appcompat:$androidxAppCompatVersion"
    implementation "androidx.coordinatorlayout:coordinatorlayout:$androidxCoordinatorLayoutVersion"
    implementation "androidx.core:core-splashscreen:$coreSplashScreenVersion"
    implementation project(':capacitor-android')
    testImplementation "junit:junit:$junitVersion"
    androidTestImplementation "androidx.test.ext:junit:$androidxJunitVersion"
    androidTestImplementation "androidx.test.espresso:espresso-core:$androidxEspressoCoreVersion"
    implementation project(':capacitor-cordova-android-plugins')
}

apply from: 'capacitor.build.gradle'

try {
    def servicesJSON = file('google-services.json')
    if (servicesJSON.text) {
        apply plugin: 'com.google.gms.google-services'
    }
} catch(Exception e) {
    logger.info("google-services.json not found, google-services plugin not applied. Push Notifications won't work")
}
