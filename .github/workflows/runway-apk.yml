name: Runway APK

on:
  push:
    branches:
      - claude/adhd-time-perception-app-9v0uj4
      - main
    paths:
      - 'apps/runway/**'
      - '.github/workflows/runway-apk.yml'
  workflow_dispatch:

permissions:
  contents: write

# A stale in-progress APK build is worthless once a newer push exists, unlike
# the Pages deploy (which we let finish so the live site is never half-built).
concurrency:
  group: runway-apk
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    # A healthy run takes ~2 minutes; the GitHub default timeout is 6 hours.
    # Runner-side flakes (job cancelled by the platform, no failed steps —
    # seen twice on 2026-07-09) can leave a run dangling far longer than any
    # real build, so cap it well above healthy but far below the default.
    timeout-minutes: 20
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '21'

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: npm
          cache-dependency-path: apps/runway/package-lock.json

      - name: Install dependencies
        working-directory: apps/runway
        run: npm ci

      - name: Typecheck
        working-directory: apps/runway
        run: npm run typecheck

      - name: Test
        working-directory: apps/runway
        run: npm run test

      - name: Build web app
        working-directory: apps/runway
        run: npm run build

      - name: Sync Capacitor Android project
        working-directory: apps/runway
        run: npx cap sync android

      - name: Make gradlew executable
        working-directory: apps/runway/android
        run: chmod +x gradlew

      - name: Build release APK
        working-directory: apps/runway/android
        run: ./gradlew assembleRelease --no-daemon

      - name: Upload APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: runway-apk
          path: apps/runway/android/app/build/outputs/apk/release/app-release.apk
          if-no-files-found: error

      # Filename is a fixed constant (runway-latest.apk), not versioned per
      # build (m5) — softprops/action-gh-release overwrites an existing
      # asset of the same name on the same tag, so each rebuild REPLACES
      # the one release asset instead of accumulating a new sha-named file
      # every push. Version + commit identity move to the release body
      # instead, where they're still visible but don't fragment the asset
      # list.
      - name: Compute release metadata
        id: vars
        run: |
          VERSION_NAME=$(grep -m1 'versionName' apps/runway/android/app/build.gradle | sed -E 's/.*versionName "([^"]+)".*/\1/')
          SHORT_SHA=$(git rev-parse --short HEAD)
          echo "version_name=${VERSION_NAME}" >> "$GITHUB_OUTPUT"
          echo "short_sha=${SHORT_SHA}" >> "$GITHUB_OUTPUT"

      - name: Rename APK for release
        run: |
          cp apps/runway/android/app/build/outputs/apk/release/app-release.apk \
             apps/runway/android/app/build/outputs/apk/release/runway-latest.apk

      - name: Publish / refresh runway-latest release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: runway-latest
          name: Runway (latest build)
          prerelease: true
          files: apps/runway/android/app/build/outputs/apk/release/runway-latest.apk
          body: |
            Build: v${{ steps.vars.outputs.version_name }} (${{ steps.vars.outputs.short_sha }})

            Automatically rebuilt release APK for Runway, refreshed on every push
            to `apps/runway/`. This is not a Play Store release — it is a
            personal sideloaded build, signed with the keystore committed at
            `apps/runway/signing/runway.keystore` (see `apps/runway/README.md`
            for the signing tradeoff).

            **Install on the S25 Ultra:**
            1. Open this page in Chrome on the phone.
            2. Download `runway-latest.apk`.
            3. Open the downloaded file; Chrome will ask permission to install
               unknown apps the first time — allow it for Chrome.
            4. Install. Updates install over the existing app; Dexie data
               survives updates (not uninstalls).
