name: Companion debug APK

on:
  push:
    branches: [claude/pd-dosing-companion]
    paths:
      - 'companion/**'
      - '.github/workflows/companion-apk.yml'
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: companion-apk-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: companion
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: companion/package-lock.json
      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 21
      - uses: android-actions/setup-android@v3
        with:
          packages: 'platform-tools platforms;android-35 build-tools;35.0.0'
      - run: npm ci
      - run: npm test
      - run: npm run build
      - run: npx cap sync android
      - run: ./gradlew assembleDebug --no-daemon
        working-directory: companion/android
      - uses: actions/upload-artifact@v4
        with:
          name: companion-debug-apk
          path: companion/android/app/build/outputs/apk/debug/app-debug.apk
          if-no-files-found: error
